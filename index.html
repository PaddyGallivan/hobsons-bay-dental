<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hobsons Bay Dental</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f0f4f8; }
    .loader { text-align: center; }
    .loader h1 { color: #2563eb; }
    .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader" id="app">
    <h1>Hobsons Bay Dental</h1>
    <div class="spinner"></div>
    <p>Loading your dental portal...</p>
  </div>
  <script>
    fetch("https://oaucfjiairycnzyqvuty.supabase.co/functions/v1/get-html")
      .then(function(r) { return r.json(); })
      .then(function(d) {
        var blob = new Blob([d.html], { type: "text/html" });
        window.location.href = URL.createObjectURL(blob);
      })
      .catch(function(e) { document.getElementById("app").innerHTML = "<h1>Error</h1><p>" + e.message + "</p>"; });
  </script>
</body>
</html>
